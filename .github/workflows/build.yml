name: Build and Release Raining Characters

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: raining-characters-linux
            nuitka_args: --output-filename=raining-characters-linux
            binary_path: raining-characters-linux
          - os: macos-latest
            artifact_name: raining-characters-macos
            nuitka_args: --output-filename=raining-characters-macos
            binary_path: raining-characters-macos
          - os: windows-latest
            artifact_name: raining-characters-windows
            nuitka_args: --output-filename=raining-characters-windows.exe
            binary_path: raining-characters-windows.exe
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --locked
      - name: Build Standalone Executable with Nuitka
        run: |
          uv run nuitka --onefile --remove-output --assume-yes-for-downloads ${{ matrix.nuitka_args }} main.py
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload Binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/raining-characters-linux/raining-characters-linux
            artifacts/raining-characters-macos/raining-characters-macos
            artifacts/raining-characters-windows/raining-characters-windows.exe
          tag_name: ${{ github.ref_name }}
          name: Raining Characters ${{ github.ref_name }}
          generate_release_notes: true